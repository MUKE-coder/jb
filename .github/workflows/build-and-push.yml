name: Build & Push to GHCR

# Builds the Docker image on GitHub's fast runners and pushes it to
# the GitHub Container Registry. Dokploy on Contabo then just pulls
# the pre-built image instead of building on its slow disk.

on:
  push:
    branches: [main]
  # Allow manually re-running from the Actions UI.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR requires the image name to be lowercase. github.repository
  # is "OWNER/REPO" mixed case, so we lowercase it below in steps.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided to the workflow.
          # The `packages: write` permission above gives it push rights
          # to GHCR for THIS repo's packages.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            # `latest` always points at the most recent main commit
            type=raw,value=latest,enable={{is_default_branch}}
            # Commit-SHA tag for traceability / rollback
            type=sha,format=short
            # `main` tag mirrors the branch name
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-time env vars (mirror what Dokploy was passing).
          # These come from GitHub repo secrets — see README for setup.
          build-args: |
            APP_URL=${{ secrets.APP_URL }}
            REGISTRY_URL=${{ secrets.REGISTRY_URL }}
            GITHUB_API_TOKEN=${{ secrets.GH_API_TOKEN }}
            NEXT_PUBLIC_DMCA_URL=${{ secrets.NEXT_PUBLIC_DMCA_URL }}
          # GitHub Actions cache for BuildKit layers — subsequent
          # builds are ~10x faster because deps + .next/cache are reused.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
